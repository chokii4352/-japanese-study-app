<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 일본어 공부 앱</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
  --pink: #ffb7c5; --pink-light: #ffe4ec; --pink-dark: #e8829a;
  --purple: #c9b8f5; --purple-light: #ede8ff;
  --mint: #b8f0e6; --mint-light: #e4fdf8;
  --yellow: #ffeaa7; --yellow-light: #fffbe6;
  --bg: #fff9fb; --text: #3d2c3e; --text-light: #8a7590;
  --shadow: 0 4px 20px rgba(200,150,170,0.15);
  --shadow-hover: 0 8px 30px rgba(200,150,170,0.3);
  --radius: 20px; --radius-sm: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── HEADER ── */
header {
  background: linear-gradient(135deg, #ffb7c5 0%, #c9b8f5 50%, #b8f0e6 100%);
  padding: 18px 20px 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '🌸🌺🌸🌺🌸🌺🌸🌺🌸🌺🌸';
  position: absolute; top: 4px; left: 0; right: 0;
  font-size: 14px; opacity: 0.4; letter-spacing: 2px;
}
header h1 { font-size: 24px; font-weight: 700; color: white; text-shadow: 0 2px 8px rgba(180,100,130,0.3); letter-spacing: 2px; position: relative; }
header p { color: rgba(255,255,255,0.85); font-size: 12px; margin-top: 3px; position: relative; }

/* ── LEVEL BADGE IN HEADER ── */
.header-level-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.92);
  border-radius: 50px;
  padding: 5px 14px;
  margin-top: 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--pink-dark);
  position: relative;
  box-shadow: 0 2px 10px rgba(200,100,140,0.2);
}
.header-level-badge .lv-num { color: #6b3fa0; }
.header-progress-wrap {
  height: 5px;
  background: rgba(255,255,255,0.4);
  border-radius: 50px;
  margin-top: 6px;
  overflow: hidden;
  width: 180px;
  margin-left: auto; margin-right: auto;
  position: relative;
}
.header-progress-fill {
  height: 100%;
  background: rgba(255,255,255,0.85);
  border-radius: 50px;
  transition: width 0.5s ease;
}

/* ── NAV ── */
nav {
  display: flex;
  background: white;
  box-shadow: 0 2px 12px rgba(200,150,170,0.12);
  overflow-x: auto; scrollbar-width: none;
  position: sticky; top: 0; z-index: 100;
}
nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex: 1; min-width: 64px;
  padding: 12px 6px;
  border: none; background: transparent; cursor: pointer;
  font-family: inherit; font-size: 11px; font-weight: 500;
  color: var(--text-light); transition: all 0.25s;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  border-bottom: 3px solid transparent; white-space: nowrap;
}
.nav-btn .icon { font-size: 18px; }
.nav-btn.active { color: var(--pink-dark); border-bottom-color: var(--pink-dark); background: var(--pink-light); }
.nav-btn:hover:not(.active) { background: #fdf5f7; color: var(--text); }

/* ── MAIN ── */
main { padding: 20px 16px 50px; max-width: 700px; margin: 0 auto; }
.section { display: none; animation: fadeIn 0.3s ease; }
.section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.section-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* ── STUDY LEVEL SELECTOR BAR ── */
.study-level-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: white;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow);
  overflow-x: auto; scrollbar-width: none;
}
.study-level-bar::-webkit-scrollbar { display: none; }
.study-level-label { font-size: 11px; font-weight: 600; color: var(--text-light); white-space: nowrap; }
.slv-btn {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 50px;
  font-family: inherit; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 2px solid transparent;
  transition: all 0.2s;
}
.slv-btn.locked { background: #f0eef4; color: #ccc; cursor: not-allowed; border-color: #e8e4f0; }
.slv-btn.unlocked { background: var(--purple-light); color: #6b3fa0; border-color: var(--purple); }
.slv-btn.active-lv { background: var(--purple); color: white; }

/* ══════════════════════════
   LEVEL OVERVIEW SECTION
══════════════════════════ */
.level-grid { display: flex; flex-direction: column; gap: 14px; }
.level-card {
  background: white;
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
  border: 2px solid transparent;
}
.level-card.unlocked { cursor: pointer; }
.level-card.unlocked:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.level-card.cleared { border-color: #a8d8a8; }
.level-card.active-level { border-color: var(--purple); }
.level-card.locked { opacity: 0.55; }
.level-card-bg {
  position: absolute; top: 0; right: -20px;
  font-size: 80px; opacity: 0.08; pointer-events: none;
  line-height: 1; transform: rotate(-15deg);
}
.level-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.level-emoji { font-size: 28px; flex-shrink: 0; }
.level-info { flex: 1; min-width: 0; }
.level-num {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--text-light); margin-bottom: 2px; text-transform: uppercase;
}
.level-name { font-size: 17px; font-weight: 700; color: var(--text); }
.level-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.level-status {
  flex-shrink: 0;
  padding: 4px 12px;
  border-radius: 50px;
  font-size: 11px; font-weight: 700;
}
.status-locked { background: #f0eef4; color: #bbb; }
.status-unlocked { background: var(--yellow-light); color: #b8860b; }
.status-cleared { background: #e8f5e9; color: #2e7d32; }
.status-current { background: var(--purple-light); color: #6b3fa0; }

/* level progress bar */
.level-prog-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.level-prog-bar { flex: 1; height: 7px; background: #f0eef4; border-radius: 50px; overflow: hidden; }
.level-prog-fill { height: 100%; border-radius: 50px; transition: width 0.5s ease; }
.level-prog-text { font-size: 11px; color: var(--text-light); white-space: nowrap; }

/* level details row */
.level-details { display: flex; gap: 16px; margin-top: 8px; }
.level-detail-item { font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 4px; }
.level-detail-item span { font-weight: 600; color: var(--text); }

/* start button */
.btn-start-level {
  display: block; width: 100%; margin-top: 12px;
  padding: 11px;
  border-radius: 50px;
  border: none;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: white;
  box-shadow: 0 4px 15px rgba(200,150,200,0.35);
}
.btn-start-level:hover { transform: translateY(-2px); }

/* ══════════════════════════
   KANA SECTION
══════════════════════════ */
.kana-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.kana-tab {
  padding: 7px 18px; border-radius: 50px;
  border: 2px solid var(--pink); background: white;
  cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500;
  color: var(--pink-dark); transition: all 0.2s;
}
.kana-tab.active { background: var(--pink); color: white; }
.kana-group-label {
  font-size: 11px; font-weight: 700; color: var(--text-light);
  letter-spacing: 1px; text-transform: uppercase;
  margin: 14px 0 8px;
  padding: 4px 10px;
  background: var(--yellow-light);
  border-radius: 6px;
  display: inline-block;
}
.kana-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(66px, 1fr));
  gap: 8px; margin-bottom: 8px;
}
.kana-card {
  background: white; border-radius: var(--radius-sm);
  padding: 10px 4px; text-align: center; box-shadow: var(--shadow);
  cursor: pointer; transition: all 0.25s; border: 2px solid transparent;
}
.kana-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--pink); }
.kana-card.revealed { background: var(--pink-light); border-color: var(--pink); }
.kana-char { font-family: 'Noto Sans JP', sans-serif; font-size: 24px; font-weight: 500; color: var(--text); display: block; }
.kana-roman { font-size: 10px; color: var(--text-light); margin-top: 3px; transition: all 0.2s; }
.kana-card:not(.revealed) .kana-roman { opacity: 0; transform: translateY(4px); }
.kana-card.revealed .kana-roman { opacity: 1; color: var(--pink-dark); font-weight: 600; transform: translateY(0); }
.kana-hint { font-size: 12px; color: var(--text-light); margin-bottom: 10px; text-align: center; }
.btn-reveal-all {
  display: block; width: 100%; padding: 11px;
  border-radius: 50px; border: 2px solid var(--pink);
  background: white; color: var(--pink-dark);
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.btn-reveal-all:hover { background: var(--pink); color: white; }

/* ══════════════════════════
   FLASHCARD SECTION
══════════════════════════ */
.flashcard-wrap {
  perspective: 1000px; margin: 0 auto 20px;
  max-width: 400px; height: 210px; cursor: pointer;
}
.flashcard-inner {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.flashcard-inner.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute; inset: 0; border-radius: var(--radius);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  backface-visibility: hidden; box-shadow: var(--shadow-hover); padding: 20px;
}
.flashcard-front { background: linear-gradient(135deg, #fff0f5, #ffe8f5); border: 2px solid var(--pink); }
.flashcard-back { background: linear-gradient(135deg, #f0f0ff, #e8e8ff); border: 2px solid var(--purple); transform: rotateY(180deg); }
.fc-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 38px; font-weight: 500; color: var(--text); }
.fc-reading { font-size: 15px; color: var(--text-light); margin-top: 5px; }
.fc-meaning { font-size: 26px; font-weight: 700; color: #6b5be6; }
.fc-example { font-size: 12px; color: var(--text-light); margin-top: 7px; text-align: center; line-height: 1.6; }
.fc-hint { font-size: 11px; color: var(--pink-dark); margin-top: 10px; opacity: 0.7; }
.fc-level-tag {
  position: absolute; top: 10px; right: 12px;
  font-size: 10px; font-weight: 700;
  background: rgba(200,150,200,0.15); color: var(--text-light);
  padding: 2px 7px; border-radius: 20px;
}
.fc-controls { display: flex; align-items: center; gap: 12px; justify-content: center; }
.fc-counter { font-size: 13px; color: var(--text-light); min-width: 60px; text-align: center; }
.btn-icon {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  cursor: pointer; font-size: 18px; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.btn-prev { background: var(--purple-light); color: var(--purple); }
.btn-next { background: var(--pink-light); color: var(--pink-dark); }
.btn-prev:hover { background: var(--purple); color: white; transform: scale(1.1); }
.btn-next:hover { background: var(--pink); color: white; transform: scale(1.1); }
.fc-shuffle-row { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
.btn-shuffle {
  padding: 9px 20px; border-radius: 50px;
  border: 2px solid var(--mint); background: var(--mint-light);
  color: #2a9d8f; font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.btn-shuffle:hover { background: var(--mint); color: white; }
.btn-all-levels {
  padding: 9px 20px; border-radius: 50px;
  border: 2px solid var(--yellow); background: var(--yellow-light);
  color: #b8860b; font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.btn-all-levels:hover { background: var(--yellow); color: #7a5800; }

/* ══════════════════════════
   QUIZ SECTION
══════════════════════════ */
.quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.quiz-score {
  background: var(--yellow-light); border: 2px solid var(--yellow);
  border-radius: 50px; padding: 5px 14px;
  font-size: 13px; font-weight: 600; color: #b8860b;
}
.quiz-pass-indicator {
  font-size: 11px; color: var(--text-light);
  background: #f0eef4; border-radius: 50px; padding: 4px 10px;
}
.quiz-pass-indicator.reachable { color: #2a9d8f; background: var(--mint-light); }
.quiz-progress-bar { height: 7px; background: #f0e8f0; border-radius: 50px; margin-bottom: 18px; overflow: hidden; }
.quiz-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--purple));
  border-radius: 50px; transition: width 0.4s ease;
}
.quiz-question-box {
  background: linear-gradient(135deg, #fff0f5, #f5f0ff);
  border-radius: var(--radius); padding: 24px 20px;
  text-align: center; margin-bottom: 18px;
  box-shadow: var(--shadow); border: 2px solid var(--pink-light);
}
.quiz-label { font-size: 11px; color: var(--text-light); margin-bottom: 7px; }
.quiz-question-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 40px; font-weight: 500; color: var(--text); }
.quiz-question-sub { font-size: 13px; color: var(--text-light); margin-top: 5px; }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.quiz-opt {
  padding: 14px 10px; border-radius: var(--radius-sm);
  border: 2px solid #e8e0ee; background: white;
  cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500;
  color: var(--text); transition: all 0.2s; text-align: center; line-height: 1.4;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--purple); background: var(--purple-light); transform: translateY(-2px); box-shadow: var(--shadow); }
.quiz-opt.correct { border-color: #4caf50; background: #f0fff0; color: #2e7d32; }
.quiz-opt.wrong { border-color: #ef5350; background: #fff0f0; color: #c62828; }
.quiz-opt:disabled { cursor: default; }
.quiz-feedback {
  text-align: center; padding: 10px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600; margin-bottom: 14px; min-height: 40px;
}
.quiz-feedback.correct { background: #f0fff0; color: #2e7d32; }
.quiz-feedback.wrong { background: #fff0f0; color: #c62828; }
.btn-next-q {
  display: block; width: 100%; padding: 13px;
  border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: white; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(200,150,200,0.4);
}
.btn-next-q:hover { transform: translateY(-2px); }
.btn-next-q:disabled { opacity: 0.45; cursor: default; transform: none; }

/* quiz result */
.quiz-result { text-align: center; padding: 28px 20px; background: linear-gradient(135deg, #fff0f5, #f5f0ff); border-radius: var(--radius); box-shadow: var(--shadow); }
.quiz-result .emoji { font-size: 56px; margin-bottom: 10px; }
.quiz-result h3 { font-size: 20px; margin-bottom: 6px; }
.quiz-result .final-score { font-size: 38px; font-weight: 700; color: var(--pink-dark); margin: 10px 0; }
.quiz-result p { color: var(--text-light); margin-bottom: 8px; font-size: 14px; }
.level-clear-banner {
  background: linear-gradient(135deg, #fffbe6, #fff0c0);
  border: 2px solid #ffe566;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin: 12px 0;
  font-size: 14px;
  font-weight: 700;
  color: #7a5800;
}
.quiz-result-btns { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
.btn-restart {
  padding: 12px 28px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: white; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 15px rgba(200,150,200,0.4); transition: all 0.2s;
}
.btn-restart:hover { transform: translateY(-2px); }
.btn-next-level {
  padding: 12px 28px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, #ffe566, #ffb700);
  color: #6b4400; font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 15px rgba(200,160,0,0.3); transition: all 0.2s;
}
.btn-next-level:hover { transform: translateY(-2px); }

/* ══════════════════════════
   CONVERSATION SECTION
══════════════════════════ */
.conv-category-tabs {
  display: flex; gap: 8px; margin-bottom: 14px;
  overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;
}
.conv-category-tabs::-webkit-scrollbar { display: none; }
.conv-cat-btn {
  flex-shrink: 0; padding: 6px 14px; border-radius: 50px;
  border: 2px solid var(--mint); background: white;
  cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500;
  color: #2a9d8f; transition: all 0.2s; white-space: nowrap;
}
.conv-cat-btn.active { background: var(--mint); color: #1a6b60; }
.conv-cat-btn:hover:not(.active) { background: var(--mint-light); }
.phrase-list { display: flex; flex-direction: column; gap: 10px; }
.phrase-card {
  background: white; border-radius: var(--radius-sm); padding: 14px;
  box-shadow: var(--shadow); border-left: 4px solid var(--mint);
  transition: all 0.2s; cursor: pointer; position: relative;
}
.phrase-card:hover { transform: translateX(4px); box-shadow: var(--shadow-hover); border-left-color: var(--pink-dark); }
.phrase-lv-tag {
  position: absolute; top: 10px; right: 10px;
  font-size: 10px; font-weight: 700; color: var(--text-light);
  background: #f5f0f8; padding: 2px 7px; border-radius: 10px;
}
.phrase-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.phrase-reading { font-size: 11px; color: var(--text-light); margin-bottom: 5px; }
.phrase-kr { font-size: 13px; font-weight: 600; color: #2a9d8f; }
.phrase-note { font-size: 11px; color: var(--text-light); margin-top: 3px; font-style: italic; }
.speak-icon { float: right; font-size: 16px; opacity: 0.45; margin-top: 2px; margin-right: 24px; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 3px; }

/* responsive */
@media (max-width: 400px) {
  .quiz-options { grid-template-columns: 1fr; }
  .fc-jp, .quiz-question-jp { font-size: 32px; }
}

/* toast */
#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: rgba(60,30,60,0.92); color: white;
  padding: 11px 22px; border-radius: 50px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>🌸 日本語 공부</h1>
  <p>단계별로 차근차근 배워요!</p>
  <div class="header-level-badge" id="headerBadge">
    <span id="headerLvEmoji">🌱</span>
    <span id="headerLvText">1단계 · 입문</span>
  </div>
  <div class="header-progress-wrap">
    <div class="header-progress-fill" id="headerProgressFill" style="width:0%"></div>
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="showSection('levelMap', this)">
    <span class="icon">🎯</span>레벨
  </button>
  <button class="nav-btn" onclick="showSection('kana', this)">
    <span class="icon">あ</span>가나
  </button>
  <button class="nav-btn" onclick="showSection('flashcard', this)">
    <span class="icon">🃏</span>카드
  </button>
  <button class="nav-btn" onclick="showSection('quiz', this)">
    <span class="icon">✏️</span>퀴즈
  </button>
  <button class="nav-btn" onclick="showSection('conv', this)">
    <span class="icon">💬</span>회화
  </button>
</nav>

<main>

  <!-- ① LEVEL MAP -->
  <section id="levelMap" class="section active">
    <div class="section-title">🎯 나의 학습 단계</div>
    <div class="level-grid" id="levelGrid"></div>
  </section>

  try { return JSON.parse(localStorage.getItem('jpProgress')) || {}; } catch(e) { return {}; }
}
function saveProgress(p) { localStorage.setItem('jpProgress', JSON.stringify(p)); }

let prog = loadProgress();
if (!prog.unlockedLevel) prog.unlockedLevel = 1;
if (!prog.bestScores) prog.bestScores = [0,0,0,0,0];
if (!prog.cleared) prog.cleared = [false,false,false,false,false];
saveProgress(prog);

// current study level (can be any unlocked level)
let studyLevel = prog.unlockedLevel; // 1-based

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'quiz') { quizStarted = false; startQuiz(); }
  if (id === 'kana') renderKanaSection();
  if (id === 'flashcard') renderFlashcardSection();
  if (id === 'conv') renderConvSection();
}

// ── Study Level Selector Bar (used in multiple sections)
function makeLevelBar(containerId, onChange) {
  const bar = document.getElementById(containerId);
  bar.innerHTML = '<span class="study-level-label">공부 단계:</span>';
  for (let i = 1; i <= 5; i++) {
    const m = LEVEL_META[i-1];
    const btn = document.createElement('button');
    btn.className = 'slv-btn' + (i > prog.unlockedLevel ? ' locked' : ' unlocked') + (i === studyLevel ? ' active-lv' : '');
    btn.textContent = (i > prog.unlockedLevel ? '🔒' : m.emoji) + ' ' + i + '단계';
    btn.title = i > prog.unlockedLevel ? '이전 단계를 클리어해야 열려요' : m.name;
    btn.onclick = () => { if (i > prog.unlockedLevel) { showToast('🔒 이전 단계를 클리어해야 열 수 있어요!'); return; } studyLevel = i; onChange(); };
    bar.appendChild(btn);
  }
}

// ── Update header
function updateHeader() {
  const m = LEVEL_META[studyLevel-1];
  document.getElementById('headerLvEmoji').textContent = m.emoji;
  document.getElementById('headerLvText').textContent = `${studyLevel}단계 · ${m.name}`;
  const cleared = prog.cleared.filter(Boolean).length;
  document.getElementById('headerProgressFill').style.width = (cleared / 5 * 100) + '%';
}

// ═══════════════════════════════════════════════════
// 0. LEVEL MAP
// ═══════════════════════════════════════════════════
function renderLevelMap() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  LEVEL_META.forEach((m, idx) => {
    const lv = idx + 1;
    const locked = lv > prog.unlockedLevel;
    const cleared = prog.cleared[idx];
    const isCurrent = lv === prog.unlockedLevel && !cleared;
    const words = LEVEL_WORDS[idx].length;
    const phrases = LEVEL_PHRASES[idx].length;
    const best = prog.bestScores[idx] || 0;

    const card = document.createElement('div');
    card.className = 'level-card ' + (locked ? 'locked' : 'unlocked') + (cleared ? ' cleared' : '') + (isCurrent ? ' active-level' : '');
    card.innerHTML = `
      <div class="level-card-bg">${m.emoji}</div>
      <div class="level-card-header">
        <div class="level-emoji">${locked ? '🔒' : m.emoji}</div>
        <div class="level-info">
          <div class="level-num">${lv}단계</div>
          <div class="level-name">${m.name}</div>
          <div class="level-sub">${m.subtitle}</div>
        </div>
        <div class="level-status ${locked?'status-locked':cleared?'status-cleared':isCurrent?'status-current':'status-unlocked'}">
          ${locked ? '잠김' : cleared ? '✓ 클리어' : isCurrent ? '현재' : '도전 가능'}
        </div>
      </div>
      ${!locked ? `
      <div class="level-details">
        <div class="level-detail-item">단어 <span>${words}개</span></div>
        <div class="level-detail-item">회화 <span>${phrases}개</span></div>
        <div class="level-detail-item">최고점 <span>${best}/10</span></div>
      </div>
      <div class="level-prog-row">
        <div class="level-prog-bar">
          <div class="level-prog-fill" style="width:${best/10*100}%;background:${m.color}"></div>
        </div>
        <div class="level-prog-text">${best}/10점</div>
      </div>
      ${!cleared ? `<button class="btn-start-level" onclick="goStudyLevel(${lv})" style="background:${m.grad};color:#3d2c3e">
        ${isCurrent ? '지금 공부하기 →' : '이 단계 공부하기 →'}
      </button>` : ''}
      ` : ''}
    `;
    grid.appendChild(card);
  });
}

function goStudyLevel(lv) {
  studyLevel = lv;
  updateHeader();
  // Switch to quiz tab
  const quizBtn = document.querySelectorAll('.nav-btn')[3];
  showSection('quiz', quizBtn);
}

// ═══════════════════════════════════════════════════
// 1. KANA
// ═══════════════════════════════════════════════════
let currentKana = 'hiragana';
let revealAll = false;

function renderKanaSection() {
  makeLevelBar('kanaLevelBar', () => { revealAll = false; renderKanaSection(); });
  renderKana();
  updateHeader();
}

function switchKana(type, btn) {
  currentKana = type;
  revealAll = false;
  document.querySelectorAll('.kana-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderKana();
}

function renderKana() {
  const content = document.getElementById('kanaContent');
  content.innerHTML = '';
  // Show groups up to studyLevel
  for (let i = 0; i < studyLevel; i++) {
    const g = KANA_GROUPS[i];
    const groupLabel = document.createElement('div');
    groupLabel.className = 'kana-group-label';
    groupLabel.textContent = `${LEVEL_META[i].emoji} ${i+1}단계 — ${g.label}`;
    content.appendChild(groupLabel);
    const grid = document.createElement('div');
    grid.className = 'kana-grid';
    const data = currentKana === 'hiragana' ? g.hira : g.kata;
    data.forEach(item => {
      const card = document.createElement('div');
      card.className = 'kana-card' + (revealAll ? ' revealed' : '');
      card.innerHTML = `<span class="kana-char">${item.c}</span><div class="kana-roman">${item.r}</div>`;
      card.onclick = () => card.classList.toggle('revealed');
      grid.appendChild(card);
    });
    content.appendChild(grid);
  }
}

function toggleRevealAll() {
  revealAll = !revealAll;
  document.querySelectorAll('.kana-card').forEach(c => {
    revealAll ? c.classList.add('revealed') : c.classList.remove('revealed');
  });
}

// ═══════════════════════════════════════════════════
// 2. FLASHCARD
// ═══════════════════════════════════════════════════
let fcWords = [];
let fcIndex = 0;
let fcFlipped = false;
let fcAllLevels = false;

function shuffleArray(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function renderFlashcardSection() {
  makeLevelBar('fcLevelBar', () => { fcAllLevels = false; document.getElementById('btnAllLevels').textContent = '전체 단어 보기'; loadFlashcardWords(); renderFlashcardSection(); });
  loadFlashcardWords();
  renderFlashcard();
  updateHeader();
}

function loadFlashcardWords() {
  if (fcAllLevels) {
    fcWords = [];
    for (let i = 0; i < prog.unlockedLevel; i++) fcWords = fcWords.concat(LEVEL_WORDS[i].map(w => ({...w, lv: i+1})));
  } else {
    fcWords = LEVEL_WORDS[studyLevel-1].map(w => ({...w, lv: studyLevel}));
  }
  fcIndex = 0;
}

function renderFlashcard() {
  if (!fcWords.length) return;
  const w = fcWords[fcIndex];
  document.getElementById('fcJp').textContent = w.jp;
  document.getElementById('fcReading').textContent = '(' + w.r + ')';
  document.getElementById('fcMeaning').textContent = w.kr;
  document.getElementById('fcExample').textContent = w.ex || '';
  document.getElementById('fcCounter').textContent = `${fcIndex+1} / ${fcWords.length}`;
  document.getElementById('fcLevelTag').textContent = `${LEVEL_META[(w.lv||studyLevel)-1].emoji} ${w.lv||studyLevel}단계`;
  document.getElementById('flashcardInner').classList.remove('flipped');
  fcFlipped = false;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('flashcardInner').classList.toggle('flipped', fcFlipped);
}
function prevCard() { fcIndex = (fcIndex-1+fcWords.length)%fcWords.length; renderFlashcard(); }
function nextCard() { fcIndex = (fcIndex+1)%fcWords.length; renderFlashcard(); }
function shuffleCards() {
  shuffleArray(fcWords); fcIndex = 0; renderFlashcard();
  const btn = document.querySelector('.btn-shuffle');
  btn.textContent = '✅ 섞었어요!';
  setTimeout(() => { btn.textContent = '🔀 섞기'; }, 1000);
}
function toggleAllLevels() {
  fcAllLevels = !fcAllLevels;
  document.getElementById('btnAllLevels').textContent = fcAllLevels ? '이 단계만 보기' : '전체 단어 보기';
  loadFlashcardWords(); renderFlashcard();
}

// ═══════════════════════════════════════════════════
// 3. QUIZ
// ═══════════════════════════════════════════════════
let quizStarted = false, quizQuestions = [], quizCurrent = 0, quizScore = 0, quizAnswered = false;
const QUIZ_TOTAL = 10, QUIZ_PASS = 7;

function startQuiz() {
  quizStarted = true;
  quizScore = 0; quizCurrent = 0; quizAnswered = false;
  makeLevelBar('quizLevelBar', () => { quizStarted = false; startQuiz(); });
  updateHeader();

  const words = LEVEL_WORDS[studyLevel-1];
  const kanaData = KANA_GROUPS[studyLevel-1].hira;
  const pool = [];

  words.forEach(w => pool.push({
    type:'word', q:w.jp, sub:w.r, label:'다음 일본어의 뜻은?',
    answer:w.kr, pool:words.map(x=>x.kr)
  }));
  kanaData.slice(0, Math.min(10, kanaData.length)).forEach(k => pool.push({
    type:'kana', q:k.c, sub:'', label:'이 가나의 읽는 법은?',
    answer:k.r, pool:kanaData.map(x=>x.r)
  }));

  shuffleArray(pool);
  quizQuestions = pool.slice(0, QUIZ_TOTAL);

  const passInd = document.getElementById('quizPassInd');
  passInd.textContent = `${QUIZ_PASS}점 이상 → ${studyLevel}단계 클리어!`;
  passInd.className = 'quiz-pass-indicator' + (!prog.cleared[studyLevel-1] ? ' reachable' : '');

  document.getElementById('quizGame').style.display = 'block';
  document.getElementById('quizResult').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const q = quizQuestions[quizCurrent];
  quizAnswered = false;
  document.getElementById('quizScore').textContent = `점수: ${quizScore}`;
  const pct = quizCurrent / QUIZ_TOTAL;
  document.getElementById('quizProgressFill').style.width = `${pct*100}%`;
  document.getElementById('quizLabel').textContent = q.label;
  document.getElementById('quizQuestion').textContent = q.q;
  document.getElementById('quizQuestionSub').textContent = q.sub;
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('btnNextQ').disabled = true;
  document.getElementById('btnNextQ').textContent = '다음 문제 →';

  const wrongPool = [...new Set(q.pool.filter(x => x !== q.answer))];
  shuffleArray(wrongPool);
  const opts = shuffleArray([q.answer, ...wrongPool.slice(0,3)]);

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt, q.answer, btn);
    container.appendChild(btn);
  });
}

function checkAnswer(selected, correct, btn) {
  if (quizAnswered) return;
  quizAnswered = true;
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  const fb = document.getElementById('quizFeedback');
  if (selected === correct) {
    quizScore++;
    btn.classList.add('correct');
    fb.textContent = '🎉 정답이에요!';
    fb.className = 'quiz-feedback correct';
  } else {
    btn.classList.add('wrong');
    fb.textContent = `❌ 오답! 정답은 "${correct}" 이에요.`;
    fb.className = 'quiz-feedback wrong';
  }
  document.getElementById('quizScore').textContent = `점수: ${quizScore}`;
  document.getElementById('btnNextQ').disabled = false;
  if (quizCurrent === QUIZ_TOTAL-1) document.getElementById('btnNextQ').textContent = '결과 보기 🌸';
}

function nextQuestion() {
  quizCurrent++;
  if (quizCurrent >= QUIZ_TOTAL) showQuizResult();
  else renderQuestion();
}

function showQuizResult() {
  document.getElementById('quizProgressFill').style.width = '100%';
  document.getElementById('quizGame').style.display = 'none';
  const resultDiv = document.getElementById('quizResult');
  resultDiv.style.display = 'block';

  const passed = quizScore >= QUIZ_PASS;
  const prevBest = prog.bestScores[studyLevel-1] || 0;
  if (quizScore > prevBest) prog.bestScores[studyLevel-1] = quizScore;

  let levelCleared = false;
  if (passed && !prog.cleared[studyLevel-1]) {
    prog.cleared[studyLevel-1] = true;
    if (studyLevel < 5 && prog.unlockedLevel < studyLevel+1) {
      prog.unlockedLevel = studyLevel+1;
    }
    levelCleared = true;
  }
  saveProgress(prog);
  updateHeader();
  renderLevelMap();

  const pct = quizScore / QUIZ_TOTAL;
  let emoji, msg;
  if (pct === 1)      { emoji='🏆'; msg='완벽해요! 素晴らしい！'; }
  else if (pct>=0.8)  { emoji='🌸'; msg='아주 잘했어요!'; }
  else if (pct>=0.6)  { emoji='😊'; msg='잘했어요! 조금만 더 연습해봐요.'; }
  else if (pct>=0.4)  { emoji='💪'; msg='아직 부족해요. 다시 도전해봐요!'; }
  else                { emoji='📚'; msg='がんばって！ 더 공부해봐요!'; }

  let clearBanner = '';
  if (levelCleared) {
    const next = LEVEL_META[studyLevel];
    clearBanner = `<div class="level-clear-banner">🎊 ${studyLevel}단계 클리어! ${next ? next.emoji+' '+(studyLevel+1)+'단계 '+next.name+'이 열렸어요!' : '모든 단계를 완료했어요! 축하해요!'}</div>`;
  } else if (!passed) {
    clearBanner = `<div style="background:#fff0f5;border:2px solid var(--pink);border-radius:12px;padding:10px 14px;margin:10px 0;font-size:13px;color:var(--pink-dark)">
      💡 ${QUIZ_PASS}점 이상이면 다음 단계가 열려요. 조금만 더 연습해봐요!
    </div>`;
  }

  const nextLvBtn = (levelCleared && studyLevel < 5)
    ? `<button class="btn-next-level" onclick="goStudyLevel(${studyLevel+1})">다음 단계 도전 ${LEVEL_META[studyLevel].emoji}</button>`
    : '';

  resultDiv.innerHTML = `
    <div class="quiz-result">
      <div class="emoji">${emoji}</div>
      <h3>퀴즈 완료! ${LEVEL_META[studyLevel-1].emoji} ${studyLevel}단계</h3>
      <div class="final-score">${quizScore} / ${QUIZ_TOTAL}</div>
      <p>${msg}</p>
      ${clearBanner}
      <div class="quiz-result-btns">
        <button class="btn-restart" onclick="startQuiz()">다시 도전 🌸</button>
        ${nextLvBtn}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════
// 4. CONVERSATION
// ═══════════════════════════════════════════════════
let currentConvLv = 1;

function renderConvSection() {
  currentConvLv = studyLevel;
  makeLevelBar('convLevelBar', () => { currentConvLv = studyLevel; renderConvSection(); });
  renderConvLevelTabs();
  renderPhrases();
  updateHeader();
}

function renderConvLevelTabs() {
  const tabs = document.getElementById('convCatTabs');
  tabs.innerHTML = '';
  for (let i = 1; i <= prog.unlockedLevel; i++) {
    const m = LEVEL_META[i-1];
    const btn = document.createElement('button');
    btn.className = 'conv-cat-btn' + (i === currentConvLv ? ' active' : '');
    btn.textContent = `${m.emoji} ${i}단계`;
    btn.onclick = () => { currentConvLv = i; renderConvLevelTabs(); renderPhrases(); };
    tabs.appendChild(btn);
  }
}

function renderPhrases() {
  const list = document.getElementById('phraseList');
  list.innerHTML = '';
  const phrases = LEVEL_PHRASES[currentConvLv-1];
  phrases.forEach(p => {
    const card = document.createElement('div');
    card.className = 'phrase-card';
    card.innerHTML = `
      <span class="speak-icon">🔊</span>
      <div class="phrase-lv-tag">${LEVEL_META[currentConvLv-1].emoji} ${currentConvLv}단계</div>
      <div class="phrase-jp">${p.jp}</div>
      <div class="phrase-reading">${p.r}</div>
      <div class="phrase-kr">${p.kr}</div>
      ${p.note ? `<div class="phrase-note">💡 ${p.note}</div>` : ''}
    `;
    card.onclick = () => speak(p.jp);
    list.appendChild(card);
  });
}

function speak(text) {
  if ('speechSynthesis' in window) {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ja-JP'; utt.rate = 0.85;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utt);
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── INIT ──
updateHeader();
renderLevelMap();
</script>
</body>
</html>
